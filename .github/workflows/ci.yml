name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: cp apps/backend/.env.example apps/backend/.env
      - run: cp apps/frontend/.env.example apps/frontend/.env
      - run: npm run audit:deps
      - run: npm run scan-secrets
      - run: npm run verify-plan
      - run: npm run security-checklist
      - run: npm run test
      - run: npm run build
